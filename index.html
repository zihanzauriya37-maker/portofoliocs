<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | TikTok</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Top Left Logo -->
    <header class="header">
        <a href="#" class="logo-text">
            <!-- Simple TikTok-like SVG Logo -->
            <svg class="logo-icon" viewBox="0 0 2859 3333" xmlns="http://www.w3.org/2000/svg">
                <path d="M2081 0c55 473 319 750 816 805v536c-400-3-765-156-1049-411v1124c-1 490-361 899-847 915-515 17-947-410-947-925 0-511 412-929 928-929 137 0 271 29 392 84v590c-118-59-246-83-377-67-282 35-492 284-482 568 11 271 237 493 509 509 306 17 568-225 568-525V0h489z"/>
            </svg>
            TikTok
        </a>
    </header>

    <!-- Main Content / Centered Card -->
    <main class="main">
        <div class="login-card">
            <div class="top-icon">
                <!-- Generic Login/Arrow Icon like in photo -->
                <svg viewBox="0 0 24 24">
                     <path d="M10 17l5-5-5-5v3H3v4h7v3zM19 3H5c-1.1 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                </svg>
            </div>
            
            <h1>Log in to TikTok</h1>
            <p>Manage your account, check notifications, comment on videos, and more.</p>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <!-- Username Input -->
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="text" class="input-field" placeholder="Email or username" required>
                </div>

                <!-- Password Input -->
                <div class="input-group password">
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" class="input-field" placeholder="Password" required>
                    <svg class="toggle-password" viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                </div>

                <a href="#" class="forgot-password">Forgot password?</a>

                <button type="submit" class="login-btn">Log In</button>
            </form>

            <div class="divider">
                <span>Or log in with</span>
            </div>

            <div class="social-login">
                <!-- Google Icon -->
                <button class="social-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="#4285F4">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                </button>
                <!-- Facebook Icon -->
                <button class="social-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </button>
                <!-- Apple Icon -->
                <button class="social-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="#000000">
                        <path d="M16.365 14.001c-.015-3.084 2.522-4.526 2.639-4.597-1.436-2.099-3.665-2.383-4.437-2.42-1.896-.192-3.702 1.116-4.665 1.116-.95 0-2.443-1.092-4.004-1.061-2.02.03-3.882 1.176-4.918 2.977-2.093 3.633-.535 9.006 1.503 11.954 1.002 1.442 2.186 3.033 3.753 2.98 1.506-.056 2.074-.968 3.889-.968 1.815 0 2.33.968 3.905.938 1.62-.03 2.638-1.445 3.626-2.898 1.144-1.674 1.614-3.298 1.637-3.379-.036-.016-3.153-1.21-3.167-4.642M14.966 6.309c.84-.1017 2.007-1.748 1.85-3.385-1.396.056-2.953 1.01-3.834 2.12-.79.99-1.42 2.1-1.26 3.205 1.517.117 2.978-.838 3.244-1.94z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer Warning Banner -->
    <div class="footer-warning">
        <svg viewBox="0 0 24 24">
            <path d="M12 2L1 21h22L12 2zm1 14h-2v-2h2v2zm0-4h-2V8h2v4z"/>
        </svg>
        PERINGATAN: Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive.
    </div>

</body>
</html>
